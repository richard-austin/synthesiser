<div #synth>
  <div class="home-button">
    <button class="material-icons" (click)="showHomeForm()">home</button>
  </div>
  <div style="display: flex; flex-direction: row">
    <div #oscillatorWindow class="oscillator-window">
      @for (osc of oscillatorParams; let i=$index; track osc) {
        <app-oscillators [secondary]="osc.ringModOutput === 'mod'"
                         [params]="oscillatorParams[i]"
                         [filters]="filters"
                         [ringMod]="ringMod"
                         [reverb]="reverb"
                         [phaser]="phaser"
                         (output)="setOscOutputTarget($event, i)">
        </app-oscillators>
      }
      <div>
        <form #oscillatorSelectForm>
          <label><input type="radio" name="oscillatorSelect" value="1"><span>1</span></label>
          <label><input type="radio" name="oscillatorSelect" value="oscilloscope"><span>2</span></label>
        </form>
      </div>
    </div>
    <app-filters #filters
                 [ringMod]="ringMod"
                 [reverb]="reverb"
                 [phaser]="phaser"
                 (output)="setFilterOutputTarget($event)"></app-filters>
    <div class="analyser">
      <app-noise [filters]="filters"
                 (output)="setNoiseOutputTarget($event)">
      </app-noise>


    </div>
    <app-ring-modulator #ringMod
                        [filters]="filters"
                        [reverb]="reverb"
                        (output)="setRingModOutPutTarget($event)">
    </app-ring-modulator>
    <app-analyser></app-analyser>
  </div>
  <div style="display: flex; flex-direction: row">
    <app-reverb-component #reverb
                          (output)="setReverbOutputTarget($event)">
    </app-reverb-component>
    <app-phaser #phaser
                (output)="setPhasorOutputTarget($event)">
    </app-phaser>
    <app-general #general></app-general>
  </div>
</div>
